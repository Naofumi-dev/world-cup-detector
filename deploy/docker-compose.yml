services:
  backend:
    build: ../backend
    restart: unless-stopped
    environment:
      # Browser origins allowed to call the API (the deployed frontend).
      WCD_CORS_ORIGINS: ${WCD_CORS_ORIGINS}
      WCD_CORS_ORIGIN_REGEX: ${WCD_CORS_ORIGIN_REGEX}
    volumes:
      - wcd-data:/app/data      # SQLite DB persists across restarts
      - wcd-models:/app/models  # trained model persists across restarts
    expose:
      - "8000"
    networks:
      - traefik
    labels:
      # Route this service through the existing Traefik reverse proxy with
      # automatic HTTPS. No Caddy / no published ports (Traefik owns 80/443).
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK}"
      - "traefik.http.routers.wcd.rule=Host(`${WCD_DOMAIN}`)"
      - "traefik.http.routers.wcd.tls=true"
      - "traefik.http.routers.wcd.tls.certresolver=${WCD_CERTRESOLVER}"
      - "traefik.http.services.wcd.loadbalancer.server.port=8000"

networks:
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK}

volumes:
  wcd-data:
  wcd-models:
