services:
  backend:
    build: ../backend
    restart: unless-stopped
    environment:
      # Browser origins allowed to call the API (the deployed frontend).
      WCD_CORS_ORIGINS: ${WCD_CORS_ORIGINS}
    volumes:
      - wcd-data:/app/data      # SQLite DB persists across restarts
      - wcd-models:/app/models  # trained model persists across restarts
    expose:
      - "8000"

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"      # needed for the Let's Encrypt challenge + http->https
      - "443:443"
    environment:
      WCD_DOMAIN: ${WCD_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data      # keeps issued TLS certs across restarts
      - caddy-config:/config
    depends_on:
      - backend

volumes:
  wcd-data:
  wcd-models:
  caddy-data:
  caddy-config:
